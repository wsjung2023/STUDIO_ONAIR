name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push makes the in-flight run pointless; do not pay for it twice.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Do not cancel macOS when Windows fails. A platform-specific break is
      # exactly what this matrix exists to surface, and cancelling the other job
      # hides half the answer.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: windows-debug
          - os: windows-latest
            preset: windows-release
          - os: macos-latest
            preset: macos-debug
          - os: macos-latest
            preset: macos-release

    steps:
      - uses: actions/checkout@v4

      # Pinned to the same 6.8.3 the presets and CMakeLists require. A floating
      # version would mean CI and developers build against different Qt.
      #
      # install-qt-action adds Qt's bin directory to PATH and exports
      # QT_ROOT_DIR/Qt6_DIR for the rest of the job, which is also why no step
      # below sets CMAKE_PREFIX_PATH explicitly (unlike the README, which must,
      # because a local dev shell does not get that for free). That behaviour
      # is per the action's own documentation, not verified by an actual run
      # of this workflow: there is no remote to push this to yet, and the
      # macOS legs have never been built anywhere. Treat this file as a draft.
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtmultimedia qtshadertools'
          cache: true

      # windows-latest ships CMake already; this step is only for the MSVC
      # compiler environment (PATH/INCLUDE/LIB for cl.exe), the same thing
      # vcvars64.bat does locally.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Installed explicitly rather than assumed from the runner image, so the
      # version is under our control on both OSes.
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      # Presets set CS_WARNINGS_AS_ERRORS=ON, so a warning fails the build here.
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      # This is deliberately unsigned and non-publishable evidence, not a
      # release upload. It proves the binary CI just built has a deterministic
      # manifest and SHA-256 before R4-04 adds signing/notarization/store steps.
      - name: Generate release manifest
        shell: pwsh
        run: |
          $artifact = if ($env:RUNNER_OS -eq 'Windows') {
            'creator_studio.exe'
          } else {
            'creator_studio.app/Contents/MacOS/creator_studio'
          }
          & scripts/write_release_manifest.ps1 `
            -ArtifactRoot "build/${{ matrix.preset }}" `
            -OutputPath "build/${{ matrix.preset }}/release-manifest.json" `
            -ProductVersion '0.1.0' `
            -SourceRevision '${{ github.sha }}' `
            -Target '${{ matrix.preset }}' `
            -Artifact $artifact

      - name: Upload unsigned release evidence
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-evidence-${{ matrix.preset }}
          path: |
            build/${{ matrix.preset }}/release-manifest.json
            build/${{ matrix.preset }}/creator_studio.exe
            build/${{ matrix.preset }}/creator_studio.app
          if-no-files-found: error

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/
          if-no-files-found: ignore
